services:
  postgres:
    # postgres:16-alpine — Alpine-based, minimal OS packages, 0 high/critical CVEs.
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a2a_brainstorm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT:-8080}
    ports:
      # Host port (BACKEND_HOST_PORT) → container port (BACKEND_PORT), both from .env.
      - "${BACKEND_HOST_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/a2a_brainstorm?sslmode=disable
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      GLOBAL_LLM_PROVIDER: ${GLOBAL_LLM_PROVIDER:-copilot}
      GLOBAL_LLM_MODEL: ${GLOBAL_LLM_MODEL:-gpt-4o}
      GLOBAL_LLM_CREDENTIAL_REF: ${GLOBAL_LLM_CREDENTIAL_REF:-COPILOT_API_KEY}
      AGENT_ENDPOINTS: ${AGENT_ENDPOINTS:-http://agent:${AGENT_PORT:-9090}}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-10}
      CONVERGENCE_THRESHOLD: ${CONVERGENCE_THRESHOLD:-0.02}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Uses busybox multi-call binary (sh + wget) copied into the distroless image.
      test: ["CMD", "/usr/local/bin/busybox", "sh", "-c",
             "wget -qO- http://localhost:${BACKEND_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Use --scale agent=N to run multiple agent instances (remove port mapping for scaling)
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        AGENT_PORT: ${AGENT_PORT:-9090}
    ports:
      # Host port (AGENT_HOST_PORT) → container port (AGENT_PORT), both from .env.
      - "${AGENT_HOST_PORT:-9090}:${AGENT_PORT:-9090}"
    environment:
      AGENT_PORT: ${AGENT_PORT:-9090}
      AGENT_LLM_PROVIDER: ${AGENT_LLM_PROVIDER:-copilot}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-gpt-4o}
      AGENT_LLM_CREDENTIAL_REF: ${AGENT_LLM_CREDENTIAL_REF:-COPILOT_API_KEY}
    healthcheck:
      test: ["CMD", "/usr/local/bin/busybox", "sh", "-c",
             "wget -qO- http://localhost:${AGENT_PORT:-9090}/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_PORT: ${FRONTEND_HOST_PORT:-5173}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:${FRONTEND_HOST_PORT:-5173}"
    environment:
      # Browser-side fetches go through the host port, not the docker-internal service name.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_HOST_PORT:-8080}}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
