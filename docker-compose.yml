services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: a2a_brainstorm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/a2a_brainstorm?sslmode=disable
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      GLOBAL_LLM_PROVIDER: ${GLOBAL_LLM_PROVIDER:-copilot}
      GLOBAL_LLM_MODEL: ${GLOBAL_LLM_MODEL:-gpt-4o}
      GLOBAL_LLM_CREDENTIAL_REF: ${GLOBAL_LLM_CREDENTIAL_REF:-COPILOT_API_KEY}
      AGENT_ENDPOINTS: ${AGENT_ENDPOINTS:-http://agent:9090}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-10}
      CONVERGENCE_THRESHOLD: ${CONVERGENCE_THRESHOLD:-0.02}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Use --scale agent=N to run multiple agent instances (remove port mapping for scaling)
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "9090:9090"
    environment:
      AGENT_PORT: ${AGENT_PORT:-9090}
      AGENT_LLM_PROVIDER: ${AGENT_LLM_PROVIDER:-copilot}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-gpt-4o}
      AGENT_LLM_CREDENTIAL_REF: ${AGENT_LLM_CREDENTIAL_REF:-COPILOT_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/.well-known/agent.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
